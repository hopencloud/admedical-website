name: Daily Pipeline

# 매일 새벽 5시 KST = 20:00 UTC 전날
# 수동 실행: Actions 탭 → Daily Pipeline → Run workflow
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cloud pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TZ: Asia/Seoul
        run: |
          python scripts/cloud_pipeline.py

      - name: Commit updated data JSONs
        env:
          TZ: Asia/Seoul
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/assets/data/*.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            DATE=$(date '+%Y-%m-%d %a')
            git commit -m "일일 통계 자동 갱신 (${DATE})"
            git push
          fi
