<body class="bg-slate-50 text-slate-900 antialiased">

<!-- 공통 헤더 (assets/js/site.js로 주입) -->
<div id="site-header"></div>

<main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-3xl md:text-4xl font-bold mb-4 tracking-tight">문의</h1>
    <div class="text-slate-600 mb-10 leading-relaxed space-y-2">
        <p>심의 통과 문구 관련 오류는 사이트 내 검색 결과의 <strong class="text-slate-900">오류 제보</strong> 버튼을 이용해 주세요.</p>
        <p>서비스 관련 문의, 협업 제안, 광고 게재 제휴 등은 아래 폼을 통해 접수해 주세요.</p>
    </div>

    <form id="contact-form" class="bg-white p-6 md:p-7 rounded-2xl border border-slate-200 shadow-soft space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="cf-name" class="block text-sm font-semibold text-slate-700 mb-1.5">이름 <span class="text-rose-600">*</span></label>
                <input id="cf-name" name="name" type="text" required maxlength="40" autocomplete="name"
                       placeholder="홍길동"
                       class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
            </div>
            <div>
                <label for="cf-phone" class="block text-sm font-semibold text-slate-700 mb-1.5">연락처 <span class="text-rose-600">*</span></label>
                <input id="cf-phone" name="phone" type="tel" required minlength="9" maxlength="20" autocomplete="tel"
                       placeholder="010-0000-0000"
                       class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
            </div>
        </div>

        <div>
            <label for="cf-email" class="block text-sm font-semibold text-slate-700 mb-1.5">이메일 <span class="text-rose-600">*</span></label>
            <input id="cf-email" name="email" type="email" required maxlength="120" autocomplete="email"
                   placeholder="answer@example.com"
                   class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
            <p class="text-xs text-slate-500 mt-1.5">답변을 받으실 이메일을 정확히 입력해주세요.</p>
        </div>

        <div>
            <label for="cf-message" class="block text-sm font-semibold text-slate-700 mb-1.5">문의 내용 <span class="text-rose-600">*</span></label>
            <textarea id="cf-message" name="message" rows="7" required minlength="5" maxlength="5000"
                      placeholder="문의하실 내용을 자세히 적어주세요."
                      class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm leading-relaxed resize-y focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"></textarea>
        </div>

        <!-- 봇 방지 1: Honeypot. CSS로 사용자에게는 안 보이고, 자동 폼 채우기 봇만 걸림. -->
        <div aria-hidden="true" style="position:absolute;left:-9999px;top:-9999px;height:0;width:0;overflow:hidden;">
            <label>홈페이지 (입력 마세요)
                <input id="cf-website" name="website" type="text" tabindex="-1" autocomplete="off" value="">
            </label>
        </div>

        <!-- 봇 방지 2: 페이지 로드 시각 (서버에서 < 3초면 봇으로 간주) -->
        <input id="cf-loaded-at" name="loaded_at" type="hidden" value="">

        <div>
            <button id="cf-submit" type="submit"
                    class="w-full px-5 py-3 bg-brand-600 text-white rounded-xl font-semibold hover:bg-brand-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                문의 접수
            </button>
            <p id="cf-status" class="hidden mt-3 text-sm text-center"></p>
        </div>

        <p class="text-xs text-slate-400 text-center pt-2 border-t border-slate-100">
            제출 시 입력하신 이름·이메일·연락처·문의 내용이 관리자에게 전송됩니다.
        </p>
    </form>
</main>

<footer class="bg-white border-t border-slate-200 mt-20">
    <div class="max-w-5xl mx-auto px-4 py-8 text-sm text-slate-500">

            <a href="/contact.html" class="hover:text-brand-600">문의</a>
            <a href="/terms.html" class="hover:text-brand-600">이용약관</a>
            <a href="/privacy.html" class="hover:text-brand-600">개인정보처리방침</a>
        </div>
    </div>
</footer>

<script>
(() => {
    const form = document.getElementById("contact-form");
    const submitBtn = document.getElementById("cf-submit");
    const statusEl = document.getElementById("cf-status");
    const loadedAtField = document.getElementById("cf-loaded-at");

    // 페이지 로드 시각 기록 (봇 방지용 — 서버에서 너무 빠른 제출 차단)
    loadedAtField.value = String(Date.now());

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name:      document.getElementById("cf-name").value.trim(),
            phone:     document.getElementById("cf-phone").value.trim(),
            email:     document.getElementById("cf-email").value.trim(),
            message:   document.getElementById("cf-message").value.trim(),
            // 봇 방지 필드
            website:   document.getElementById("cf-website").value,    // 허니팟 (사람은 빈 값)
            loaded_at: loadedAtField.value,                            // 페이지 열린 시각
        };

        statusEl.className = "mt-3 text-sm text-center text-slate-600";
        statusEl.textContent = "전송 중...";
        statusEl.classList.remove("hidden");
        submitBtn.disabled = true;

        try {
            const r = await fetch("/api/contact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });
            if (r.ok) {
                statusEl.className = "mt-3 text-sm text-center text-emerald-700 font-semibold";
                statusEl.textContent = "✓ 문의가 접수되었습니다. 확인 후 답신드리겠습니다.";
                form.reset();
                loadedAtField.value = String(Date.now()); // 새 제출용 시각 갱신
            } else {
                const j = await r.json().catch(() => ({}));
                statusEl.className = "mt-3 text-sm text-center text-rose-700";
                statusEl.textContent = "전송 실패: " + (j.error || r.status);
            }
        } catch (err) {
            statusEl.className = "mt-3 text-sm text-center text-rose-700";
            statusEl.textContent = "네트워크 오류: " + err.message;
        } finally {
            submitBtn.disabled = false;
        }
    });
})();
</script>
