<body class="bg-slate-50 text-slate-900 antialiased">

<!-- 공통 헤더 (assets/js/site.js로 주입) -->
<div id="site-header"></div>

<main class="max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl md:text-4xl font-bold mb-3 tracking-tight">심의통과 TOP 20 키워드</h1>
    <p class="text-slate-600 mb-8">의료광고심의위원회를 통과한 광고에서 자주 등장한 키워드 Top 20을 보여드립니다.</p>

    <!-- 4개 탭: 지난주 / 지난달 / 이번주 / 이번달 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-1 p-1 bg-slate-100 rounded-xl mb-6">
        <button data-period="last-week"  class="tab-btn px-3 py-2 font-semibold text-sm rounded-lg text-slate-500 hover:text-slate-900">지난주</button>
        <button data-period="last-month" class="tab-btn px-3 py-2 font-semibold text-sm rounded-lg text-slate-500 hover:text-slate-900">지난달</button>
        <button data-period="this-week"  class="tab-btn px-3 py-2 font-semibold text-sm rounded-lg text-slate-500 hover:text-slate-900">이번주</button>
        <button data-period="this-month" class="tab-btn px-3 py-2 font-semibold text-sm rounded-lg text-slate-500 hover:text-slate-900">이번달</button>
    </div>

    <div id="period-info" class="text-sm text-slate-500 mb-5"></div>

    <!-- 광고 슬롯: TOP 20 리스트 위 -->
    <div class="ad-slot" data-slot-name="top20-top" data-ad-format="auto"></div>

    <ol id="top20-list" class="space-y-2"></ol>

    <p id="loading" class="text-center text-slate-500 py-12">로딩 중...</p>
</main>

<footer class="bg-white border-t border-slate-200 mt-20">
    <div class="max-w-5xl mx-auto px-4 py-8 text-sm text-slate-500">
        <div class="flex flex-wrap gap-5 mb-3 font-medium">
            <a href="/about.html" class="hover:text-brand-600">서비스 소개</a>
            <a href="/top20.html" class="hover:text-brand-600">심의통과 TOP 20 키워드</a>
            <a href="/contact.html" class="hover:text-brand-600">문의</a>
            <a href="/terms.html" class="hover:text-brand-600">이용약관</a>
            <a href="/privacy.html" class="hover:text-brand-600">개인정보처리방침</a>
        </div>
    </div>
</footer>

<script>
// 기간별 데이터 소스 매핑
const PERIOD_CONFIG = {
    "this-week":  { label: "이번주",  json: "/assets/data/this_week_top20.json"  },
    "this-month": { label: "이번달",  json: "/assets/data/this_month_top20.json" },
    "last-week":  { label: "지난주",  json: "/assets/data/weekly_top20.json"     },
    "last-month": { label: "지난달",  json: "/assets/data/monthly_top20.json"    },
};

const TAB_ACTIVE = "tab-btn px-3 py-2 font-semibold text-sm rounded-lg bg-white text-brand-600 shadow-sm";
const TAB_IDLE   = "tab-btn px-3 py-2 font-semibold text-sm rounded-lg text-slate-500 hover:text-slate-900";

function escapeHtml(s) {
    return String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
}

async function loadTop20(period) {
    const cfg = PERIOD_CONFIG[period] || PERIOD_CONFIG["this-week"];
    const list = document.getElementById("top20-list");
    const info = document.getElementById("period-info");
    const loading = document.getElementById("loading");
    list.innerHTML = "";
    info.textContent = "";
    loading.classList.remove("hidden");

    // 탭 활성화 상태 갱신
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.className = btn.dataset.period === period ? TAB_ACTIVE : TAB_IDLE;
    });

    // URL 동기화 (뒤로가기로 복원되도록)
    const url = new URL(location.href);
    url.searchParams.set("period", period);
    history.replaceState(null, "", url);

    try {
        const r = await fetch(cfg.json, { cache: "no-store" });
        if (!r.ok) throw new Error(`fetch failed: ${r.status}`);
        const data = await r.json();
        loading.classList.add("hidden");
        const adsCount = (data.ads_analyzed ?? 0).toLocaleString();
        info.textContent = `${data.label || cfg.label} • 광고 ${adsCount}건 분석`;
        data.top20.forEach((item, i) => {
            const li = document.createElement("li");
            li.className = "flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 hover:border-brand-500 hover:shadow-soft transition";
            li.innerHTML = `
                <span class="w-8 text-center font-bold text-brand-600 tabular-nums">${i + 1}</span>
                <span class="flex-1 font-medium text-slate-900">${escapeHtml(item.expression)}</span>
                <span class="text-xs text-slate-500 tabular-nums">${item.count}건 등장</span>
            `;
            list.appendChild(li);
        });
        if (data.top20.length === 0) {
            list.innerHTML = `<p class="text-center text-slate-500 py-12">${cfg.label} 데이터가 아직 없습니다.</p>`;
        }
    } catch (e) {
        loading.classList.add("hidden");
        list.innerHTML = `<p class="text-center text-slate-500 py-12">아직 ${cfg.label} 데이터가 준비되지 않았습니다.</p>`;
    }
}

// 탭 클릭 핸들러
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => loadTop20(btn.dataset.period));
});

// 첫 로드: URL 쿼리 ?period= 또는 기본값 "last-week"
const initial = new URLSearchParams(location.search).get("period");
loadTop20(PERIOD_CONFIG[initial] ? initial : "last-week");
</script>
<script src="/assets/js/site.js"></script>
<script src="/assets/js/ads.js" defer></script>
</body>
